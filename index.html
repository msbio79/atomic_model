<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원자모형 시뮬레이션</title>
    <meta name="description" content="고등학교 과학 원자모형 시뮬레이션">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- 캔버스 영역 -->
        <main class="simulation-area">
            <div class="canvas-container">
                <canvas id="atomCanvas"></canvas>
            </div>

            <div class="zoom-controls">
                <button id="btnToggleAnim" title="일시정지 / 재생">
                    <svg id="iconPause" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                        stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                    <svg id="iconPlay" style="display: none;" viewBox="0 0 24 24" width="20" height="20"
                        stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <div id="zoomDivider"
                    style="width: 1px; height: 16px; background: rgba(255,255,255,0.2); margin: 0 5px;"></div>
                <button id="btnZoomOut" title="축소">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
                <div id="zoomLevel">100%</div>
                <button id="btnZoomIn" title="확대">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
            </div>
        </main>

        <!-- 오른쪽 컨트롤 패널 -->
        <aside class="control-panel">
            <header class="app-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>원자모형 시뮬레이션</h1>
                    <p>입자를 조절하거나 주기율표를 선택하세요.</p>
                </div>
                <button id="btnThemeToggle" title="테마 변경" class="theme-btn">
                    <svg id="iconMoon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="iconSun" style="display:none;" viewBox="0 0 24 24" width="18" height="18"
                        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span id="themeText">라이트모드</span>
                </button>
            </header>

            <section class="info-card">
                <div class="element-symbol" id="elSymbol">H</div>
                <div class="element-details">
                    <div class="element-header">
                        <select id="elSelect" class="element-select"></select>
                        <span class="ion-badge" id="ionState">중성</span>
                    </div>
                    <!-- 오비탈 전자 배열 배치 -->
                    <div id="orbitalConfig" class="orbital-config"></div>
                    <div class="stats-grid">
                        <div class="stat"><span class="label">원자번호 (Z)</span><span class="value" id="statZ">1</span>
                        </div>
                        <div class="stat"><span class="label">질량수 (A)</span><span class="value" id="statA">1</span>
                        </div>
                        <div class="stat"><span class="label">알짜전하</span><span class="value" id="statCharge">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="particle-controls">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="margin-bottom: 0;">보기 옵션</h3>
                    <div style="display: flex; gap: 6px;">
                        <button id="btnNucleusView" class="view-toggle-btn" style="padding: 4px 8px;">핵: 입자로</button>
                        <button id="btnShellLabel" class="view-toggle-btn" style="padding: 4px 8px;">껍질: 기호로</button>
                    </div>
                </div>

                <div class="control-row">
                    <div class="particle-label text-proton">
                        <span class="dot bg-proton"></span> 양성자 (p⁺)
                    </div>
                    <div class="stepper">
                        <button class="step-btn" id="subProton">-</button>
                        <span class="particle-count" id="countProton">1</span>
                        <button class="step-btn" id="addProton">+</button>
                    </div>
                </div>

                <div class="control-row">
                    <div class="particle-label text-neutron">
                        <span class="dot bg-neutron"></span> 중성자 (n⁰)
                    </div>
                    <div class="stepper">
                        <button class="step-btn" id="subNeutron">-</button>
                        <span class="particle-count" id="countNeutron">0</span>
                        <button class="step-btn" id="addNeutron">+</button>
                    </div>
                </div>

                <div class="control-row">
                    <div class="particle-label text-electron">
                        <span class="dot bg-electron"></span> 전자 (e⁻)
                    </div>
                    <div class="stepper">
                        <button class="step-btn" id="subElectron">-</button>
                        <span class="particle-count" id="countElectron">1</span>
                        <button class="step-btn" id="addElectron">+</button>
                    </div>
                </div>
            </section>

            <section class="periodic-table-section">
                <h3>주기율표 (1~20번)</h3>
                <div class="periodic-grid" id="periodicTable">
                    <!-- 스크립트로 렌더링 됩니다 -->
                </div>
            </section>
        </aside>
    </div>
    <script src="script.js"></script>
</body>

</html>
